- term: All-in-One
  definition: In Tiny Houses sind Küche, Wohnzimmer und Schlafzimmer oft in einem Raum untergebracht. Solche All-in-One-Lösungen erfordern kreative Raumgestaltung und multifunktionale Möbel.
- term: Aussendusche
  definition: Einige Tiny Houses haben eine Aussendusche, um den Innenraum zu sparen und die Nähe zur Natur zu geniessen.
- term: Autarkie
  definition: In der Tiny House Bewegung steht der Begriff Autarkie für die Unabhängigkeit von externen Versorgungsnetzen. Viele Tiny Houses sind darauf ausgelegt, unabhängig von Strom-, Wasser- oder Abwassernetzen zu funktionieren.
- term: Barrierefreiheit
  definition: Einige Tiny Houses sind so konzipiert, dass sie auch für Menschen mit eingeschränkter Mobilität geeignet sind. Barrierefreie Tiny Houses haben oft spezielle Einrichtungen wie Rampen oder Haltegriffe.
- term: Bauanleitung
  definition: Ein Leitfaden, der Schritt-für-Schritt-Anweisungen für den Bau eines Tiny Houses bietet, oft inklusive Materiallisten und Baupläne.
- term: Baugenehmigung
  definition: Vor dem Bau eines Tiny Houses ist in den meisten Fällen eine Baugenehmigung erforderlich. Diese stellt sicher, dass das Gebäude alle gesetzlichen Anforderungen erfüllt.
- term: Bauvorschriften
  definition: Diese legen fest, welche Art von Gebäuden in einer bestimmten Zone erlaubt sind. In vielen Fällen müssen Tiny Houses bestimmte Bauvorschriften erfüllen, um als Wohnraum anerkannt zu werden.
- term: Beuteltoiletten
  definition: Bei diesen Toiletten werden die Abfälle in speziellen Beuteln gesammelt, die anschliessend entsorgt werden können. Sie sind eine einfache und tragbare Option, erfordern jedoch regelmässigen Austausch der Beutel.
- term: Biophilie
  definition: Die menschliche Sehnsucht nach einer Verbindung zur Natur. Tiny Houses mit großen Glasfronten und Naturmaterialien holen die Außenwelt nach innen und fördern so die psychische Gesundheit.
- term: Circular Living
  definition: Ein Lebensstil, der auf Kreisläufen basiert. Das reicht vom Kompostieren bis hin zum Bau des Hauses aus recycelbaren Materialien (Cradle-to-Cradle), um keinen ökologischen Fußabdruck zu hinterlassen.
- term: Co-Housing
  definition: Bezeichnet eine Wohnform, bei der mehrere Menschen oder Familien in einer Gemeinschaft zusammenleben. In der Tiny-House-Szene gibt es oft spezielle Co-Housing-Projekte, in denen mehrere Tiny Houses um einen gemeinsamen Bereich gruppiert sind.
- term: Containerhaus
  definition: Ein Tiny House, das aus einem oder mehreren umgebauten Frachtcontainern besteht. Diese Häuser sind oft günstig und können sehr robust sein, aber sie haben auch spezielle Anforderungen in Bezug auf Isolierung und Gestaltung.
- term: Coworking
  definition: In einigen Tiny House Gemeinschaften gibt es Coworking-Spaces, die eine professionelle Arbeitsumgebung bieten. Dies ist besonders attraktiv für Menschen, die remote arbeiten und Wert auf Gemeinschaft legen.
- term: Dachgarten
  definition: Ein kleiner Garten, der auf dem Dach eines Tiny Houses angelegt ist, oft zur Nahrungsmittelproduktion oder einfach zur Ästhetik.
- term: Digital Detoxing
  definition: Der bewusste Verzicht auf digitale Medien. Viele Tiny-House-Besitzer nutzen den reduzierten Raum, um die Bildschirmzeit zu senken und sich wieder mehr der analogen Welt und der Natur zu widmen.
- term: Digitaler Nomade
  definition: Einige Tiny-House-Bewohner arbeiten remote und nutzen die Mobilität ihres Hauses, um als digitale Nomaden zu leben. Sie können von überall aus arbeiten, solange es eine Internetverbindung gibt.
- term: DIY (Do It Yourself)
  definition: Viele Tiny Houses werden im Eigenbau hergestellt. Die DIY-Kultur ist in der Bewegung stark vertreten, und es gibt zahlreiche Ressourcen und Anleitungen für den Selbstbau.
- term: Downsizing
  definition: Downsizing bezeichnet den Prozess der Reduzierung des persönlichen Besitzes und des Wohnraums. Beim Umzug in ein Tiny House ist dieser Schritt oft notwendig, um sich auf das Wesentliche zu konzentrieren. Dabei geht es nicht nur um die räumliche Dimension, sondern auch um ein einfacheres, fokussierteres Leben. Downsizing kann eine tiefgreifende Erfahrung sein, die viele Menschen als Befreiung empfinden.
- term: Dünnschicht-Solarzellen
  definition: Diese Solarzellen sind dünner und flexibler als kristalline Solarzellen, aber in der Regel auch weniger effizient.
- term: Einfamilien-Tiny-House
  definition: Ein Tiny House, das speziell für die Bedürfnisse einer Einzelperson konzipiert ist, oft mit besonderem Augenmerk auf Raumoptimierung und einfache Bedienung.
- term: Einspeisevergütung
  definition: Ein finanzieller Anreiz für die Erzeugung von Solarstrom, bei dem Überschussstrom zu einem festgelegten Preis ins öffentliche Netz eingespeist wird.
- term: Elektrisches System
  definition: Die elektrische Infrastruktur eines Tiny Houses, die oft speziell konzipiert ist, um Energie zu sparen und Sicherheitsstandards zu erfüllen.
- term: Energieeffizienz
  definition: Viele Tiny Houses sind so konzipiert, dass sie möglichst wenig Energie verbrauchen. Dies wird durch effiziente Dämmung, Solarpaneele und andere Technologien erreicht.
- term: Entschleunigung
  definition: Ein Lebensstil, der sich gegen die Hektik des Alltags richtet. Im Tiny House wird dies durch weniger Hausarbeit, geringere Fixkosten und die Nähe zur Natur gefördert, was Raum für mehr Zeit und Ruhe schafft.
- term: EPS (expandiertes Polystyrol)
  definition: Ein leichtes, synthetisches Material, das vor allem für seine Wärmedämmung bekannt ist. Es ist wasserabweisend, aber weniger umweltfreundlich als natürliche Optionen.
- term: Fenstergestaltung
  definition: Wegen der begrenzten Wandfläche in Tiny Houses ist die Positionierung und Grösse der Fenster entscheidend für natürliches Licht und Belüftung.
- term: Fernreisen
  definition: Einige Tiny House Bewohner nutzen ihr mobiles Zuhause für ausgedehnte Reisen und leben quasi als moderne Nomaden.
- term: Fernsteuerung
  definition: Viele Tiny Houses nutzen smarte Technologien, um Funktionen wie Beleuchtung, Temperatur und sogar Möbel per Smartphone steuern zu können.
- term: Fertighaus
  definition: Ein Tiny House, das in einer Fabrik vorgefertigt und dann zum Standort transportiert wird. Fertighäuser sind oft schneller zu bauen und können günstiger sein als individuell geplante Tiny Houses.
- term: Flachdach
  definition: Bei einem Flachdach sind die Dachflächen fast eben, mit einer sehr geringen Neigung für den Wasserablauf. Flachdächer sind oft einfacher und schneller zu bauen, bieten aber weniger zusätzlichen Raum. Sie sind beliebt für moderne, minimalistische Tiny Houses.
- term: Flexibilität
  definition: Ein Schlüsselkonzept in Tiny Houses, bei dem Möbel und Räume für mehrere Zwecke genutzt werden können.
- term: Foldable
  definition: Manche Tiny Houses haben klappbare Elemente wie Wände oder Möbel, die für zusätzlichen Raum sorgen können. Wenn der Platz nicht benötigt wird, können diese Elemente einfach eingeklappt werden.
- term: Fussabdruck
  definition: Der ökologische Fussabdruck eines Tiny Houses ist in der Regel viel kleiner als der eines traditionellen Hauses. Dies zieht viele Menschen an, die einen umweltfreundlicheren Lebensstil anstreben. Durch den geringeren Ressourcenverbrauch und die Möglichkeit, nachhaltige Technologien einzusetzen, können Bewohner ihren Impact auf die Umwelt signifikant reduzieren.
- term: Fussbodenheizung
  definition: Eine Heizmethode, bei der die Heizelemente im Boden des Tiny Houses integriert sind, um eine gleichmässige Wärme zu erzeugen.
- term: Gemeinschaft
  definition: Innerhalb der Tiny-House-Bewegung gibt es eine starke Gemeinschaft von Gleichgesinnten. Oft gibt es auch Tiny House Dörfer, in denen Menschen mit ähnlichen Interessen und Zielen zusammenleben.
- term: Gemeinschaftsgarten
  definition: Ein Gartenbereich, der von einer Tiny-House-Gemeinschaft gemeinsam genutzt und gepflegt wird.
- term: Gemeinschaftsraum
  definition: Ein Raum oder Bereich, der von einer Tiny-House-Gemeinschaft gemeinsam genutzt wird, oft für Aktivitäten wie Kochen oder gesellschaftliche Zusammenkünfte.
- term: Glaswolle
  definition: Ähnlich wie Steinwolle, aber aus geschmolzenem Glas hergestellt. Es ist leicht und einfach zu installieren, bietet aber weniger Feuchtigkeitsresistenz.
- term: Grauwassersystem
  definition: Ein System zur Wiederverwendung von leicht verschmutztem Wasser (z.B. aus der Dusche), oft in Kombination mit einer Regenwassernutzung.
- term: Grauwassertank
  definition: Ein Behälter zur Aufbewahrung von gebrauchtem Wasser aus Duschen und Waschbecken, das oft für die Toilettenspülung oder zur Gartenbewässerung wiederverwendet wird.
- term: Grid-Tie-System
  definition: Ein Solarsystem, das an das öffentliche Stromnetz angeschlossen ist.
- term: Grundriss
  definition: Der Plan eines Tiny Houses, der zeigt, wo die verschiedenen Räume und Funktionen untergebracht sind.
- term: Haftpflichtversicherung
  definition: Eine Versicherung, die Schäden abdeckt, die durch das Tiny House an Dritten oder ihrem Eigentum verursacht werden könnten.
- term: Hakenleiste
  definition: Ein einfaches, aber effektives Aufbewahrungselement, das oft in Tiny Houses verwendet wird, um Dinge wie Kleidung oder Küchenutensilien zu organisieren.
- term: Hanfdämmung
  definition: Aus den Fasern der Hanfpflanze hergestellt, bietet es eine gute Wärme- und Schalldämmung. Es ist auch feuchtigkeitsregulierend und nachhaltig.
- term: Hartschaumplatten
  definition: Aus Materialien wie Polyurethan, sind sie sehr effizient in der Wärmedämmung, aber weniger atmungsaktiv und umweltfreundlich.
- term: Holzofen
  definition: Ein kleiner Ofen, der mit Holz befeuert wird und in einigen Tiny Houses als Hauptwärmequelle dient.
- term: Holzwolle
  definition: Aus Holzfasern hergestellt, ist dieses Material sowohl wärme- als auch schalldämmend. Es ist umweltfreundlich und oft in Plattenform erhältlich.
- term: Hybrid-Tiny-House
  definition: Ein Tiny House, das sowohl stationär als auch mobil sein kann, oft mit abnehmbaren Rädern oder einer konvertierbaren Plattform.
- term: Hygge
  definition: Ein dänischer Begriff für Herzlichkeit und Gemütlichkeit. Im Tiny House beschreibt es die Kunst, auf kleinem Raum eine Atmosphäre von Geborgenheit, Licht und Wärme zu schaffen.
- term: Intentionale Gemeinschaft
  definition: Das bewusste Zusammenleben mit Gleichgesinnten (z.B. in Tiny House Dörfern), um Ressourcen zu teilen, soziale Isolation zu vermeiden und sich gegenseitig zu unterstützen.
- term: Isolation
  definition: Die Art der verwendeten Isolationsmaterialien kann in einem Tiny House entscheidend sein, um Energieeffizienz und Komfort zu gewährleisten.
- term: Kaminofen
  definition: Ein moderner Holzofen mit einem stilvollen Design. Oft mit einer grösseren Glasscheibe und höherer Effizienz. Kann auch als Einbaugerät in einer Wand installiert werden.
- term: Kilowattstunde (kWh)
  definition: Eine Masseinheit für Energie, die oft zur Messung des Energieertrags von Solaranlagen verwendet wird.
- term: Klappbett
  definition: Ein Bett, das hochgeklappt werden kann, um tagsüber als Schreibtisch oder Sitzbereich zu dienen und so Platz zu sparen.
- term: Klapptisch
  definition: Ein Tisch, der an der Wand befestigt ist und bei Bedarf heruntergeklappt werden kann, um Platz zu sparen.
- term: Klimaanlage
  definition: Ein Gerät zur Klimatisierung des Innenraums eines Tiny Houses, oft kompakter und energieeffizienter als herkömmliche Modelle.
- term: Kompakte Elektrogeräte
  definition: Speziell entwickelte, kleinere Versionen von Haushaltsgeräten wie Öfen, Kühlschränken oder Waschmaschinen, die in Tiny Houses verwendet werden.
- term: Komposttoiletten
  definition: Diese Toiletten trennen Feststoffe von Flüssigkeiten. Die Feststoffe werden in einem Behälter mit Kompostierungsmaterialien wie Sägemehl oder Kokosfasern gemischt. Dies fördert den Kompostierungsprozess, der die Abfälle in nützlichen Dünger umwandelt.
- term: Krüppelwalmdach
  definition: Ein Krüppelwalmdach ist eine Variation des Walmdachs, bei dem die vier Hauptseiten durch kleinere Dreiecksflächen ergänzt werden, die als "Krüppel" bezeichnet werden. Diese Form kann ästhetisch ansprechend sein und zusätzlichen Raum bieten.
- term: Lagom
  definition: Ein schwedisches Lebenskonzept, das „genau das richtige Maß" bedeutet. Weder zu viel noch zu wenig. Im Tiny House steht Lagom für die perfekte Balance zwischen Komfort und Verzicht.
- term: Lagerraum
  definition: Da der Platz in einem Tiny House begrenzt ist, wird der verfügbare Lagerraum oft sehr kreativ genutzt, zum Beispiel durch Einbau von Stauraum in Treppen oder Möbeln.
- term: Landkauf
  definition: Einige Tiny-House-Besitzer entscheiden sich dafür, ein Stück Land zu kaufen, auf dem sie ihr Tiny House abstellen können. Dies bietet mehr Unabhängigkeit, aber auch mehr Verantwortung.
- term: Leistungsfaktor
  definition: Ein Mass für die Effizienz einer Solaranlage, oft in Watt pro Quadratmeter angegeben.
- term: Loft
  definition: Ein Loft in einem Tiny House ist ein erhöhter Bereich, der meist als Schlafplatz dient. Aufgrund der begrenzten Grundfläche ist diese vertikale Raumnutzung eine clevere Möglichkeit, den vorhandenen Platz optimal auszunutzen.
- term: Mansarddach
  definition: Ein Mansarddach hat zwei verschiedene Neigungen an jeder der vier Seiten, wobei die untere Neigung viel steiler ist als die obere. Es bietet viel Raum im Dachgeschoss und ist oft in luxuriöseren Designs zu finden.
- term: Mehrzweckmöbel
  definition: Aufgrund des begrenzten Raums sind Mehrzweckmöbel in Tiny Houses weit verbreitet. Ein Bett kann tagsüber als Sofa dienen, oder ein Tisch kann als Arbeits- und Essbereich genutzt werden. Diese Möbel sind oft clever designt und erfordern eine durchdachte Raumaufteilung.
- term: Micro-Apartment
  definition: Eine sehr kleine Wohnung, die viele der gleichen Prinzipien der Raumoptimierung und des Minimalismus wie ein Tiny House anwendet.
- term: Minimalismus
  definition: Der Minimalismus als Lebensphilosophie steht oft im Zusammenhang mit dem Tiny House Movement. Es geht darum, sich auf das Wesentliche zu beschränken und bewusst zu leben. In einem Tiny House wird dieser Ansatz oft auf die Spitze getrieben, da der Raum für Überflüssiges fehlt.
- term: Minimalistische Küche
  definition: Eine Küche in einem Tiny House, die nur die grundlegendsten Geräte und Utensilien enthält, um Platz und Ressourcen zu sparen.
- term: Mobilität
  definition: Ein grosser Vorteil vieler Tiny Houses ist ihre Mobilität. Sie sind oft auf Rädern gebaut und können daher relativ einfach von einem Ort zum anderen bewegt werden. Das bietet Freiheit und Flexibilität, kann aber auch Herausforderungen in Bezug auf Zulassung und Versicherung mit sich bringen.
- term: Modulbauweise
  definition: Viele Tiny Houses werden modulare gebaut, was bedeutet, dass sie aus einzelnen Bauteilen bestehen, die flexibel kombiniert werden können. Das ermöglicht individuelle Anpassungen und erleichtert Erweiterungen oder Änderungen im Nachhinein.
- term: Monokristalline Solarzellen
  definition: Solarzellen aus einem einzigen Kristall. Sie sind effizienter, aber auch teurer als polykristalline Solarzellen.
- term: Murphy-Bett
  definition: Ein Klappbett, das in eine Wand oder einen Schrank integriert ist und bei Bedarf herausgeklappt werden kann.
- term: Nachhaltigkeit
  definition: Tiny Houses sind oft ein Ausdruck des Wunsches nach einem nachhaltigeren Lebensstil. Durch ihre geringe Grösse benötigen sie weniger Material und Energie. Ausserdem werden sie häufig aus ökologisch verträglichen Materialien gebaut und mit erneuerbaren Energien betrieben.
- term: Netzmetering
  definition: Ein Abrechnungssystem, bei dem die Menge an ins Netz eingespeistem Strom von der Stromrechnung des Haushalts abgezogen wird.
- term: Offene Gestaltung
  definition: Ein Designkonzept, bei dem mehrere Funktionen in einem einzigen Raum integriert sind, um das Gefühl von Geräumigkeit zu erzeugen.
- term: Off-Grid
  definition: Ein Tiny House, das nicht an öffentliche Versorgungsnetze wie Strom und Wasser angeschlossen ist und sich selbst versorgt.
- term: Off-Grid-System
  definition: Ein unabhängiges Solarsystem, das nicht an das öffentliche Stromnetz angeschlossen ist.
- term: Outdoor-Ofen
  definition: Speziell für den Einsatz im Freien konzipiert, oft tragbar. Ideal für Leute, die das Outdoor-Leben eines Tiny House geniessen möchten.
- term: Ownership vs. Stewardship
  definition: Der philosophische Wechsel vom „Besitzen" zum „Verwalten". Man sieht sich nicht als Eigentümer eines Stücks Land, sondern als dessen Hüter, der es für kommende Generationen bewahrt.
- term: Passive Solarheizung
  definition: Ein Ansatz zur Ausrichtung und Konstruktion eines Tiny Houses, der darauf abzielt, Sonnenenergie optimal für die Beheizung des Innenraums zu nutzen.
- term: Pelletsofen
  definition: Verwendet Holzpellets als Brennstoff und ist oft automatisiert, was das Heizen einfacher macht. Allerdings benötigt er Strom und ist weniger romantisch als traditionelle Holzöfen.
- term: Photovoltaik
  definition: Dieser Begriff beschreibt die direkte Umwandlung von Sonnenlicht in elektrische Energie mithilfe von Solarzellen. Photovoltaikanlagen sind auf vielen Tiny Houses zu finden, um unabhängig vom Stromnetz zu sein.
- term: Platte
  definition: Ein grosses Stück Holz oder Metall, das als Basis für den Bau eines Tiny Houses dient.
- term: Podest
  definition: Ein erhöhter Bereich in einem Tiny House, oft genutzt für Stauraum oder als Schlafbereich.
- term: Polykristalline Solarzellen
  definition: Solarzellen, die aus vielen kleinen Kristallen bestehen. Sie sind weniger effizient, aber auch günstiger als monokristalline Solarzellen.
- term: Pultdach
  definition: Ein Pultdach hat nur eine schräge Dachfläche und neigt sich zu einer Seite hin. Es ist oft die wirtschaftlichste und einfachste Dachform und wird häufig für Anbauten oder kleinere Tiny Houses verwendet.
- term: Recycelte Materialien
  definition: Viele Tiny-House-Bauer verwenden recycelte oder wiederaufbereitete Materialien, um die Umweltauswirkungen des Baus zu minimieren.
- term: Regenwasserauffangsystem
  definition: Ein System zur Sammlung und Lagerung von Regenwasser, das dann für verschiedene Zwecke im Tiny House verwendet werden kann.
- term: Ressourceneffizienz
  definition: Der sparsame Umgang mit Ressourcen wie Wasser und Energie, oft durch innovative Technologien und Designlösungen in Tiny Houses.
- term: Rocket Stove
  definition: Ein effizienter Ofen, der wenig Brennstoff benötigt. Er ist leicht und oft tragbar, was ihn ideal für ein Tiny House macht.
- term: RV
  definition: Steht für "Recreational Vehicle" und bezeichnet ein Fahrzeug, das als Wohnraum dient. Einige Tiny Houses sind als RVs klassifiziert, was in Bezug auf die Zulassung und Standortwahl relevant sein kann.
- term: Satteldach
  definition: Ein Satteldach besteht aus zwei gegenüberliegenden Dachflächen, die an der höchsten, horizontalen Kante, dem Dachfirst, zusammentreffen. Diese Art von Dach ist wegen seiner Einfachheit und Effektivität bei der Regenwasserabführung weit verbreitet. In Tiny Houses kann ein Satteldach den Vorteil haben, dass man im Dachgeschoss zusätzlichen Raum gewinnt, etwa für ein Loft.
- term: Schafswolle
  definition: Ein natürliches Dämmmaterial, das Feuchtigkeit reguliert und gute thermische Eigenschaften hat. Es ist auch hypoallergen und nicht brennbar, was es zu einer sicheren Option macht.
- term: Schiebetür
  definition: Eine Tür, die seitlich verschoben wird, um Platz zu sparen und den Zugang zu verschiedenen Bereichen des Tiny Houses zu erleichtern.
- term: Schleppdach
  definition: Ein Schleppdach ist eine Art von Anbauten an die Hauptdachform. Es hat in der Regel eine geringere Neigung als das Hauptdach und wird oft für Veranden oder Erweiterungen verwendet.
- term: Schwarzwassertank
  definition: Ein Behälter zur Aufbewahrung von Abwasser aus der Toilette, der regelmässig entleert werden muss.
- term: Schwedenofen
  definition: Ein klassischer Holzofen, oft aus Gusseisen. Er ist kompakt und passt gut in ein Tiny House. Der Schwedenofen hat eine grosse Glasscheibe, die eine direkte Sicht auf das Feuer ermöglicht.
- term: Sichtbare Balken
  definition: Ein Gestaltungselement in einigen Tiny Houses, bei dem die Tragstruktur des Hauses sichtbar bleibt, oft als ästhetisches Highlight.
- term: SIPS
  definition: Steht für Structural Insulated Panels. Es handelt sich um vorgefertigte Wandelemente, die sowohl isolierend als auch strukturell stabil sind. Sie sind besonders in der Tiny-House-Bewegung beliebt, da sie leicht und einfach zu montieren sind.
- term: Skoolie
  definition: Ein Skoolie ist ein umgebauter Schulbus, der als Wohnraum dient. Diese spezielle Art von Tiny House hat den Vorteil der Mobilität und bietet oft erstaunlich viel Platz. Allerdings gibt es auch Herausforderungen in Bezug auf die Strassentauglichkeit und Zulassung.
- term: Slow Living
  definition: Eine Bewegung, die dazu aufruft, das Tempo im Alltag zu drosseln. Das Tiny House ist das physische Fundament für diesen Lebensstil, da es weniger Pflege, weniger Arbeit und weniger Konsumdruck bedeutet.
- term: Solardach
  definition: Ein Dach, das mit Solarzellen ausgestattet ist, um Energie für das Tiny House zu erzeugen.
- term: Solarfenster
  definition: Transparente Materialien, die Sonnenlicht durchlassen, aber auch die Wärmeenergie der Sonne für die Heizung nutzen können.
- term: Solarkollektor
  definition: Ein Bauelement in einer solarthermischen Anlage, das die Sonnenenergie absorbiert und in Wärme umwandelt.
- term: Solarladeregler
  definition: Ein Gerät, das den Ladestrom von der Solaranlage zur Batterie regelt und überwacht, um die Batterieeffizienz zu maximieren und ihre Lebensdauer zu verlängern.
- term: Solarpumpe
  definition: Eine Pumpe, die von Solarenergie angetrieben wird, oft verwendet in solarthermischen Systemen.
- term: Solarthermie
  definition: Dabei wird die Wärme der Sonne direkt genutzt, oft zur Warmwasserbereitung oder zur Heizungsunterstützung.
- term: Solartracker
  definition: Ein Mechanismus, der die Ausrichtung der Solarzellen oder -kollektoren während des Tages automatisch anpasst, um die Energieausbeute zu maximieren.
- term: Speicherofen
  definition: Dieser Ofen speichert Wärme in einem speziellen Material und gibt sie über einen längeren Zeitraum ab. Ideal, wenn man die Wärme für längere Zeit speichern möchte.
- term: Speichersystem
  definition: Ein System aus Batterien oder anderen Speichermedien, das überschüssigen Solarstrom für spätere Verwendung speichert.
- term: Spitzdach
  definition: Ein Spitzdach ist eine extreme Form eines Satteldachs mit einer sehr hohen und spitzen Form. Es bietet viel Raum im Dachgeschoss, ist aber aufgrund der komplexeren Konstruktion auch teurer
- term: Standortanalyse
  definition: Die Bewertung eines Standorts hinsichtlich seiner Eignung für Solaranlagen, unter Berücksichtigung von Faktoren wie Sonneneinstrahlung, Schattenwurf und Ausrichtung.
- term: Steinwolle
  definition: Hergestellt aus vulkanischem Gestein, bietet es eine hervorragende thermische und akustische Dämmung. Es ist feuerbeständig und wasserabweisend.
- term: Stelzenhaus
  definition: Ein Tiny House, das auf Stelzen gebaut ist, um Hochwasser oder anderen natürlichen Bedingungen standzuhalten.
- term: Steuervorteile
  definition: In einigen Ländern oder Regionen gibt es steuerliche Vorteile für den Besitz eines Tiny Houses, da sie oft als sekundäre oder temporäre Wohnsitze gelten.
- term: Suffizienz
  definition: 'Die Strategie der Genügsamkeit. Es ist die Frage: „Wie viel ist genug?" Suffizienz im Tiny House bedeutet, den Ressourcenverbrauch durch Verhaltensänderung statt nur durch Technik zu senken.'
- term: Tiny House auf Rädern
  definition: Ein Tiny House, das auf einem Anhänger gebaut ist und somit mobil ist.
- term: Tiny-House-Blog
  definition: Eine Online-Plattform, auf der Tiny-House-Enthusiasten ihre Erfahrungen, Tipps und Designs teilen.
- term: Tiny-House-Buch
  definition: Veröffentlichungen, die sich speziell mit dem Thema Tiny Houses befassen, sei es als Bauanleitung, Erfahrungsbericht oder philosophische Betrachtung.
- term: Tiny House Community
  definition: Eine Gemeinschaft von Tiny-House-Besitzern, die Ressourcen, Erfahrungen und oft auch Land teilen.
- term: Tiny House für Familien
  definition: Ein grösseres Tiny House, das so konzipiert ist, dass es eine Familie beherbergen kann, oft mit zusätzlichen Lofts oder Etagenbetten für Kinder.
- term: Tiny House für Paare
  definition: Ein Tiny House, das zwei Bewohnern ausreichend Platz und Komfort bietet, oft mit geteilten und privaten Bereichen.
- term: Tiny House Hotel
  definition: Einige Unternehmer haben Tiny Houses als Hotelzimmer oder Ferienhäuser im Angebot. Diese bieten eine gute Möglichkeit, das Leben im Tiny House auszuprobieren, bevor man sich für den Kauf entscheidet.
- term: Tiny House Messe
  definition: Eine Veranstaltung, bei der verschiedene Tiny House Modelle ausgestellt werden, oft mit Workshops und Vorträgen.
- term: Tiny-House-Vorschriften
  definition: Gesetze und Regelungen, die den Bau und die Nutzung von Tiny Houses betreffen, variieren oft von Ort zu Ort.
- term: Tonnendach
  definition: Ein Tonnendach ist ein halbzylindrisches Dach, das wie eine auf der Seite liegende Tonne aussieht. Diese Dachform ist eher selten und in der Regel teurer in der Herstellung, kann aber ästhetisch sehr ansprechend sein.
- term: Trockentrenntoilette
  definition: Eine wasserlose Toilette, die Urin und Feststoffe mechanisch in zwei getrennte Behälter leitet. Ohne Wasser und Chemie werden Feststoffe mit Einstreu (z. B. Hobelspäne) abgedeckt und später kompostiert, während der Urin separat entsorgt oder verdünnt als Dünger genutzt wird. Im Tiny House besonders beliebt, da kein Kanalanschluss nötig ist und sie komplett autark funktioniert.
- term: Überhitzungsschutz
  definition: Ein System, das verhindert, dass die Solaranlage bei zu hoher Sonneneinstrahlung überhitzt und dadurch beschädigt wird.
- term: Urin-Trenntoiletten
  definition: Diese Toiletten trennen Urin von Feststoffen, um Geruchsbildung zu minimieren und die Kompostierung der Feststoffe zu erleichtern. Der Urin wird in einem separaten Behälter gesammelt und kann als Dünger verwendet oder sicher entsorgt werden.
- term: Veranda
  definition: Ein kleiner Aussenbereich, oft in Form eines Decks oder einer Veranda, der das Wohnraumgefühl eines Tiny Houses erweitert.
- term: Verbrennungstoiletten
  definition: Diese Art von Toilette verbrennt die Abfallstoffe bei sehr hohen Temperaturen, wodurch Asche entsteht. Diese Toiletten benötigen Strom, sind aber effektiv in der Geruchsbeseitigung und erzeugen nur eine geringe Menge an Rückständen.
- term: Vermietung
  definition: Manche Besitzer vermieten ihr Tiny House zeitweise, um zusätzliche Einnahmen zu generieren. Dies kann besonders attraktiv sein, wenn das Tiny House an einem touristisch interessanten Ort steht.
- term: Vollfinanzierung
  definition: Manche Menschen finanzieren den Kauf oder Bau eines Tiny Houses durch Kredite oder Crowdfunding. Die geringeren Kosten im Vergleich zu herkömmlichen Häusern machen eine Vollfinanzierung oft realistischer.
- term: Wabi-Sabi
  definition: Eine japanische Ästhetik, die Schönheit im Unvollkommenen, Alten und Einfachen findet. Passt perfekt zu Tiny Houses aus Naturmaterialien, die mit der Zeit eine eigene Patina entwickeln.
- term: Wagenlizenz
  definition: Einige Tiny Houses auf Rädern benötigen eine spezielle Lizenz oder Registrierung, um auf öffentlichen Strassen bewegt werden zu dürfen.
- term: Walmdach
  definition: Ein Walmdach hat vier schräge Seiten, die alle zur Wand hin abfallen. Im Gegensatz zum Satteldach gibt es keine vertikalen Giebelseiten. Diese Dachform ist stabil und bietet guten Schutz gegen Wind. In einem Tiny House kann es aber komplexer und teurer in der Herstellung sein.
- term: Wassergeführter Holzofen
  definition: Dieser spezielle Ofen ist an ein Warmwassersystem angeschlossen und kann somit nicht nur den Raum, sondern auch Wasser für Heizkörper oder sanitäre Anlagen erhitzen. Das macht ihn besonders vielseitig und effizient, allerdings ist die Installation komplexer und oft teurer. Ein wassergeführter Holzofen ist eine gute Option für diejenigen, die ein ganzheitliches Heizsystem in ihrem Tiny House integrieren möchten.
- term: Wechselrichter
  definition: Ein Gerät, das den Gleichstrom (DC) der Solarzellen in Wechselstrom (AC) umwandelt, damit dieser im Haushalt verwendet oder ins Netz eingespeist werden kann.
- term: Zellulose
  definition: Aus recyceltem Papier hergestellt, ist dieses Material eine umweltfreundliche Option. Es ist gut für die Wärme- und Schalldämmung und hat auch feuerhemmende Eigenschaften.
- term: Zeltdach
  definition: Ein Zeltdach formt eine Pyramide und besteht in der Regel aus vier gleichschenkligen Dreiecken. Es wird oft für Türmchen oder kleinere Strukturen wie Pavillons verwendet, kann aber auch in einem Tiny House für ein markantes Design sorgen.
- term: Zoneneinteilung
  definition: Die Regelungen, die festlegen, wo ein Tiny House aufgestellt werden darf und welche Voraussetzungen es erfüllen muss.
- term: Zoning
  definition: Dies bezieht sich auf die gesetzlichen Vorschriften für das Abstellen und Bewohnen eines Tiny Houses. Die Regeln können je nach Region stark variieren und eine Herausforderung darstellen. Vor dem Kauf oder Bau eines Tiny Houses sollte man sich daher genau mit den lokalen Bestimmungen vertraut machen.
- term: Zulassung
  definition: Dieser Begriff bezieht sich auf die rechtlichen Aspekte des Besitzes eines Tiny Houses. Je nachdem, ob es als festes Gebäude oder als Fahrzeug klassifiziert ist, gelten unterschiedliche Gesetze und Vorschriften.
